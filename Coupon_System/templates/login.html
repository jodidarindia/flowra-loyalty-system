{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<style>
.login-page {
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    background:
        radial-gradient(circle at 15% 15%, rgba(37,99,235,0.45), transparent 28%),
        radial-gradient(circle at 85% 25%, rgba(124,58,237,0.35), transparent 30%),
        linear-gradient(135deg, #eef5ff, #f7f2ff);
}

.cursor-glow {
    position: fixed;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37,99,235,0.25), transparent 70%);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
}

.login-card {
    position: relative;
    z-index: 2;
    padding: 35px;
    border-radius: 25px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(18px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.15);
}

.login-logo-wrap {
    width: 75px;
    height: 75px;
    margin: auto;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    color: #fff;
    font-size: 2rem;
}

.custom-input {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #ddd;
    background: #fff;
}

.custom-input:focus-within {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

.custom-input .form-control {
    border: none;
    box-shadow: none;
}

.custom-input .input-group-text {
    border: none;
    background: transparent;
    color: #2563eb;
}

.password-eye-btn {
    border: none;
    background: transparent;
    color: #64748b;
    padding: 0 14px;
    transition: 0.25s;
}

.password-eye-btn:hover {
    color: #2563eb;
}

.flowra-btn {
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    transition: 0.3s;
}

.flowra-btn:hover {
    transform: translateY(-2px);
}

.flowra-back-btn {
    display: inline-block;
    padding: 8px 15px;
    border-radius: 10px;
    background: #fff;
    border: 1px solid #ddd;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.flowra-back-btn:hover {
    color: #2563eb;
}
</style>

<div class="login-page">
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row justify-content-center w-100">
            <div class="col-md-6 col-lg-4">
                <div class="login-card shadow-lg">

                    <div class="text-center mb-4">
                        <div class="login-logo-wrap">
                            <i class="fa-solid fa-shield-halved"></i>
                        </div>
                        <h2 class="mt-3 fw-bold">FLOWRA Login</h2>
                        <p class="text-muted">Login to continue</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <div class="input-group custom-input">
                                <span class="input-group-text">
                                    <i class="fa-solid fa-envelope"></i>
                                </span>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <div class="input-group custom-input">
                                <span class="input-group-text">
                                    <i class="fa-solid fa-lock"></i>
                                </span>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    id="passwordInput"
                                    required
                                >

                                <button type="button" class="password-eye-btn" id="togglePassword">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn flowra-btn w-100">
                            Login Now
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{{ url_for('home') }}" class="flowra-back-btn">
                            <i class="fa-solid fa-arrow-left"></i> Back
                        </a>
                    </div>

                    <div class="text-center mt-2">
                        <small class="text-muted">
                            Secure • Fast • FLOWRA
                        </small>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
const cursorGlow = document.getElementById("cursorGlow");

document.addEventListener("mousemove", function(e) {
    if (!cursorGlow) return;
    cursorGlow.style.left = e.clientX + "px";
    cursorGlow.style.top = e.clientY + "px";
});

const togglePassword = document.getElementById("togglePassword");
const passwordInput = document.getElementById("passwordInput");

togglePassword.addEventListener("click", function() {
    const icon = this.querySelector("i");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
});
</script>

{% endblock %}
