{% extends "base.html" %}
{% block title %}Subscription Submitted{% endblock %}

{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f6f8;padding:20px;">
    <div style="max-width:480px;width:100%;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:32px;text-align:center;box-shadow:0 12px 28px rgba(15,23,42,.08);">
        <h2 style="font-weight:800;margin-bottom:10px;">Enquiry Submitted</h2>
        <p style="color:#6b7280;line-height:1.7;margin-bottom:22px;">
            Thanks! Our team will contact you shortly regarding your selected subscription plan.
        </p>
        <a href="{{ url_for('auth.pricing') }}" style="display:inline-block;background:#1453f3;color:#fff;text-decoration:none;padding:12px 18px;border-radius:10px;font-weight:700;">
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
